name: Update Stock Prices

on:
  schedule:
    # Runs Mon-Fri at 9:30 PM UTC (after US market close)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and apply latest prices
        run: python update_prices.py --apply

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet stocks/ && echo "No price changes" && exit 0
          git add stocks/
          git commit -m "Update stock prices ($(date -u +%Y-%m-%d))"
          git push
